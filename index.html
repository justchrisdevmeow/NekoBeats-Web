<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NekoBeats Web</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Status Bar -->
  <div id="status-bar">
    <span id="status-icon">🐱</span>
    <span id="status-text">ready</span>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="idle-screen">
      <div id="idle-cat">🐱</div>
      <div id="idle-text">upload a track to begin</div>
    </div>
    <button id="fullscreen-btn" title="Fullscreen">⛶</button>
  </div>

  <!-- Progress -->
  <div id="progress-wrap">
    <div id="progress-bar"></div>
    <span id="time-current">0:00</span>
    <span id="time-total">0:00</span>
  </div>

  <!-- Transport -->
  <div id="transport">
    <button id="file-btn">upload track</button>
    <input type="file" id="file-input" accept="audio/*">
    <span id="track-name">no track loaded</span>
    <label class="toggle-wrap">
      <input type="checkbox" id="loop-toggle">
      <span class="toggle-label">loop</span>
    </label>
  </div>

  <!-- Main Panel -->
  <div id="main-panel">

    <!-- Left: Controls -->
    <div id="controls-panel">
      <div class="panel-title">controls</div>

      <div class="control-group">
        <div class="control-row">
          <div class="control-label">bar count <span id="bar-count-out">64</span></div>
          <input type="range" id="bar-count" min="16" max="256" step="16" value="64">
        </div>
        <div class="control-row">
          <div class="control-label">height scale <span id="height-out">1.5</span>x</div>
          <input type="range" id="height-scale" min="0.5" max="4" step="0.1" value="1.5">
        </div>
        <div class="control-row">
          <div class="control-label">sensitivity <span id="sensitivity-out">1.0</span></div>
          <input type="range" id="sensitivity" min="0.1" max="3" step="0.1" value="1.0">
        </div>
        <div class="control-row">
          <div class="control-label">opacity <span id="opacity-out">100</span>%</div>
          <input type="range" id="opacity-val" min="10" max="100" step="1" value="100">
        </div>
        <div class="control-row">
          <div class="control-label">smoothing <span id="smooth-out">0.80</span></div>
          <input type="range" id="smooth-val" min="0" max="0.95" step="0.05" value="0.8">
        </div>
        <div class="control-row" id="rainbow-speed-row" style="display:none;">
          <div class="control-label">rainbow speed <span id="rainbow-speed-out">1.0</span></div>
          <input type="range" id="rainbow-speed" min="0.1" max="5" step="0.1" value="1.0">
        </div>
        <div class="control-row" id="bloom-intensity-row" style="display:none;">
          <div class="control-label">bloom intensity <span id="bloom-intensity-out">0.5</span></div>
          <input type="range" id="bloom-intensity" min="0.1" max="1" step="0.05" value="0.5">
        </div>
        <div class="control-row" id="fade-speed-row" style="display:none;">
          <div class="control-label">fade speed <span id="fade-speed-out">0.05</span></div>
          <input type="range" id="fade-speed" min="0.01" max="0.2" step="0.01" value="0.05">
        </div>
        <div class="control-row" id="particle-count-row" style="display:none;">
          <div class="control-label">particle count <span id="particle-count-out">50</span></div>
          <input type="range" id="particle-count" min="10" max="200" step="10" value="50">
        </div>
      </div>

      <!-- Mode -->
      <div class="panel-title" style="margin-top:16px;">mode</div>
      <div class="btn-group" id="mode-group">
        <button class="mode-btn active" data-mode="bars">bars</button>
        <button class="mode-btn" data-mode="wave">wave</button>
        <button class="mode-btn" data-mode="mirror">mirror</button>
        <button class="mode-btn" data-mode="circle">circle</button>
      </div>

      <!-- Effects -->
      <div class="panel-title" style="margin-top:16px;">effects</div>
      <div class="btn-group" id="effects-group">
        <button class="effect-btn" data-effect="bloom">bloom</button>
        <button class="effect-btn" data-effect="fade">fade</button>
        <button class="effect-btn" data-effect="particles">particles</button>
        <button class="effect-btn" data-effect="space">space</button>
      </div>

    </div>

    <!-- Center: Color -->
    <div id="color-panel">
      <div class="panel-title">color</div>

      <div class="btn-group" id="color-mode-group">
        <button class="color-mode-btn active" data-cmode="solid">solid</button>
        <button class="color-mode-btn" data-cmode="rainbow">rainbow</button>
        <button class="color-mode-btn" data-cmode="rainbow_multi">rainbow multi</button>
        <button class="color-mode-btn" data-cmode="gradient_bar">gradient bar</button>
        <button class="color-mode-btn" data-cmode="gradient_global">gradient global</button>
      </div>

      <div id="solid-color-wrap" class="color-sub">
        <label class="color-label">color</label>
        <input type="color" id="bar-color" value="#00cfd1">
      </div>

      <div id="gradient-color-wrap" class="color-sub" style="display:none;">
        <div style="display:flex;gap:12px;align-items:center;">
          <div>
            <label class="color-label">start</label>
            <input type="color" id="grad-start" value="#00cfd1">
          </div>
          <div>
            <label class="color-label">end</label>
            <input type="color" id="grad-end" value="#ff006e">
          </div>
        </div>
      </div>

    </div>

    <!-- Right: Themes & Bar Themes -->
    <div id="themes-panel">

      <div class="panel-title">theme settings</div>
      <div class="btn-group">
        <button id="export-theme-btn">export</button>
        <button id="import-theme-btn">import</button>
        <input type="file" id="import-theme-input" accept=".json" style="display:none;">
      </div>

      <div class="panel-title" style="margin-top:16px;">bar theme</div>
      <div id="bartheme-list" class="btn-group-col">
        <button class="bartheme-btn active" data-theme="default">default</button>
        <button class="bartheme-btn" data-theme="rounded">rounded</button>
        <button class="bartheme-btn" data-theme="thin">thin</button>
        <button class="bartheme-btn" data-theme="hollow">hollow</button>
        <button class="bartheme-btn" data-theme="triangles">triangles</button>
        <button class="bartheme-btn" data-theme="dots">dots</button>
        <button class="bartheme-btn" data-theme="space">space</button>
      </div>
      <div class="btn-group" style="margin-top:10px;">
        <button id="import-bartheme-btn">import bar theme</button>
        <input type="file" id="import-bartheme-input" accept=".json" style="display:none;">
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/barthemes.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/controls.js"></script>
</body>
</html>
